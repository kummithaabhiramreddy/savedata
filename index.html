<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Cloud | Premium Storage</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #030305;
            --bg-surface: rgba(20, 20, 25, 0.7);
            --bg-surface-hover: rgba(35, 35, 45, 0.8);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-muted: #8b8b99;
            --accent-1: #6366f1;
            --accent-2: #a855f7;
            --accent-3: #ec4899;
            --sidebar-width: 260px;
            --font-family: 'Plus Jakarta Sans', sans-serif;
            --radius-lg: 24px;
            --radius-md: 16px;
            --radius-sm: 8px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: var(--font-family); 
            background: var(--bg-base); 
            color: var(--text-main); 
            min-height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* Animated Background Gradients */
        .bg-glow {
            position: fixed;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(99,102,241,0.15) 0%, rgba(0,0,0,0) 70%);
            top: -20vw;
            left: -10vw;
            z-index: 0;
            pointer-events: none;
            animation: float 15s ease-in-out infinite alternate;
        }
        .bg-glow-2 {
            position: fixed;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, rgba(236,72,153,0.1) 0%, rgba(0,0,0,0) 70%);
            bottom: -10vw;
            right: -10vw;
            z-index: 0;
            pointer-events: none;
            animation: float 20s ease-in-out infinite alternate-reverse;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(5%, 5%) scale(1.1); }
        }

        /* Glassmorphism Utilities */
        .glass {
            background: var(--bg-surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
        }

        /* Auth Screen */
        #authScreen {
            position: fixed; inset: 0; z-index: 100;
            display: flex; align-items: center; justify-content: center;
            background: var(--bg-base);
            transition: opacity 0.5s;
        }
        .auth-card {
            width: 100%; max-width: 420px;
            padding: 40px; border-radius: var(--radius-lg);
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative; overflow: hidden;
        }
        .auth-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
            background: linear-gradient(90deg, var(--accent-1), var(--accent-2), var(--accent-3));
        }
        .auth-title { font-size: 28px; font-weight: 700; margin-bottom: 10px; }
        .auth-title span { 
            background: linear-gradient(to right, var(--accent-1), var(--accent-3));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .auth-subtitle { color: var(--text-muted); font-size: 14px; margin-bottom: 30px; }
        
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        .auth-input {
            width: 100%; padding: 14px 16px; border-radius: var(--radius-md);
            background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border-color);
            color: white; font-family: inherit; font-size: 15px; transition: all 0.3s;
        }
        .auth-input:focus { border-color: var(--accent-1); background: rgba(99,102,241,0.05); outline: none; }
        
        .btn {
            width: 100%; padding: 15px; border-radius: var(--radius-md);
            background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
            color: white; font-family: inherit; font-size: 15px; font-weight: 600;
            border: none; cursor: pointer; transition: all 0.3s;
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.3);
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 12px 25px rgba(99, 102, 241, 0.4); }
        .auth-error { color: #ef4444; font-size: 13px; margin-bottom: 15px; min-height: 20px; }

        /* Main Layout */
        #appLayout {
            display: none; width: 100%; height: 100vh; position: relative; z-index: 10;
        }

        /* Sidebar */
        .sidebar {
            width: var(--sidebar-width); height: 100%;
            border-right: 1px solid var(--border-color);
            display: flex; flex-direction: column; padding: 24px;
        }
        .logo-area { display: flex; align-items: center; gap: 12px; margin-bottom: 40px; }
        .logo-icon { 
            width: 36px; height: 36px; border-radius: 10px;
            background: linear-gradient(135deg, var(--accent-1), var(--accent-3));
            display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 18px;
        }
        .logo-text { font-size: 20px; font-weight: 700; letter-spacing: 0.5px; }

        .nav-menu { display: flex; flex-direction: column; gap: 8px; flex: 1; }
        .nav-item {
            display: flex; align-items: center; gap: 12px; padding: 12px 16px;
            border-radius: var(--radius-sm); color: var(--text-muted); text-decoration: none;
            font-weight: 500; font-size: 14px; transition: all 0.2s; cursor: pointer;
        }
        .nav-item:hover, .nav-item.active {
            background: rgba(255, 255, 255, 0.05); color: var(--text-main);
        }
        .nav-item.active {
            background: rgba(99, 102, 241, 0.1); color: var(--accent-1); border-left: 3px solid var(--accent-1);
        }
        .nav-icon { font-size: 18px; }

        .storage-widget {
            margin-top: auto; padding: 20px; border-radius: var(--radius-md);
            background: rgba(255, 255, 255, 0.02); border: 1px solid var(--border-color);
        }
        .storage-title { font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 12px; text-transform: uppercase;}
        .progress-bar { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; margin-bottom: 8px; }
        .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent-1), var(--accent-2)); transition: width 0.5s; }
        .storage-text { font-size: 13px; color: var(--text-muted); }

        /* Main Content */
        .main-content {
            flex: 1; display: flex; flex-direction: column; height: 100%; overflow: hidden;
        }
        .header {
            height: 80px; padding: 0 40px; display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid var(--border-color);
        }
        .search-bar {
            position: relative; width: 350px;
        }
        .search-input {
            width: 100%; padding: 12px 20px 12px 45px; border-radius: 30px;
            background: rgba(255,255,255,0.03); border: 1px solid var(--border-color);
            color: white; font-family: inherit; font-size: 14px; transition: all 0.3s;
        }
        .search-input:focus { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.2); outline: none; }
        .search-icon { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
        
        .header-actions { display: flex; align-items: center; gap: 20px; }
        .btn-upload {
            padding: 10px 24px; border-radius: 30px;
            background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
            color: white; font-family: inherit; font-size: 14px; font-weight: 600;
            border: none; cursor: pointer; transition: all 0.3s;
            display: flex; align-items: center; gap: 8px; box-shadow: 0 4px 15px rgba(99, 102, 241, 0.2);
        }
        .btn-upload:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(99, 102, 241, 0.35); }
        .profile-btn {
            display: flex; align-items: center; gap: 12px; cursor: pointer; padding: 6px 12px; border-radius: 30px; transition: background 0.2s;
        }
        .profile-btn:hover { background: rgba(255,255,255,0.05); }
        .avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--accent-3); display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; }
        .profile-name { font-size: 14px; font-weight: 500; }

        .content-scroll {
            flex: 1; overflow-y: auto; padding: 40px;
        }
        .content-scroll::-webkit-scrollbar { width: 8px; }
        .content-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

        .section-title { font-size: 20px; font-weight: 600; margin-bottom: 24px; display: flex; justify-content: space-between; align-items: center; }

        /* Files List */
        .files-table { width: 100%; border-collapse: collapse; }
        .files-table th { 
            text-align: left; padding: 12px 16px; font-size: 12px; font-weight: 600; 
            color: var(--text-muted); text-transform: uppercase; border-bottom: 1px solid var(--border-color);
        }
        .files-table td { 
            padding: 16px; border-bottom: 1px solid rgba(255,255,255,0.03); 
            font-size: 14px; transition: background 0.2s;
        }
        .file-row:hover td { background: rgba(255,255,255,0.02); cursor: pointer; }
        .file-name-cell { display: flex; align-items: center; gap: 12px; font-weight: 500; }
        .file-icon { font-size: 20px; }
        .file-action-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 4px; border-radius: 4px; transition: all 0.2s; }
        .file-action-btn:hover { color: #ef4444; background: rgba(239, 68, 68, 0.1); }
        .file-download-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 4px; border-radius: 4px; transition: all 0.2s; margin-right: 8px;}
        .file-download-btn:hover { color: var(--accent-1); background: rgba(99, 102, 241, 0.1); }

        /* Empty State */
        .empty-state {
            text-align: center; padding: 80px 20px;
        }
        .empty-icon { font-size: 64px; margin-bottom: 20px; opacity: 0.5; }
        .empty-text { font-size: 16px; color: var(--text-muted); margin-bottom: 24px; }
        
        #fileInput, #folderInput { display: none; }

        /* Toast */
        .toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px);
            background: rgba(20,20,25,0.9); border: 1px solid var(--accent-1);
            color: white; padding: 12px 24px; border-radius: 30px; font-size: 14px; font-weight: 500;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 1000;
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.2);
        }
        .toast.show { transform: translateX(-50%) translateY(0); }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            #appLayout { flex-direction: column; }
            .sidebar { 
                width: 100%; height: auto; padding: 12px 20px;
                border-right: none; border-bottom: 1px solid var(--border-color);
                flex-direction: row; align-items: center; justify-content: space-between;
                z-index: 20; background: var(--bg-surface); backdrop-filter: blur(20px);
            }
            .logo-area { margin-bottom: 0; }
            .logo-text { display: none; }
            .nav-menu { flex-direction: row; gap: 5px; flex: 0; }
            .nav-item { padding: 8px 12px; font-size: 0; }
            .nav-item .nav-icon { margin-right: 0; font-size: 20px; }
            .storage-widget { display: none; }
            
            .header { height: auto; padding: 15px 20px; flex-direction: column; gap: 12px; align-items: stretch; z-index: 10; }
            .search-bar { width: 100%; }
            .header-actions { justify-content: space-between; width: 100%; gap: 10px; }
            .btn-upload { padding: 10px 5px; font-size: 12px; flex: 1; justify-content: center; }
            .profile-btn { padding: 0; }
            .profile-name { display: none; }
            
            .content-scroll { padding: 20px; padding-bottom: 80px; }
            .folders-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; margin-bottom: 24px; }
            .folder-card { padding: 16px; }
            .files-table { display: block; overflow-x: auto; white-space: nowrap; }
            
            .auth-card { padding: 30px 20px; width: 90%; }
            .auth-title { font-size: 24px; }
            
            .toast { width: 90%; text-align: center; font-size: 12px; padding: 12px; }
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="bg-glow-2"></div>

    <!-- Auth Screen -->
    <div id="authScreen" class="glass">
        <div class="auth-card glass">
            <div class="auth-title">Nexus<span>Cloud</span></div>
            <div class="auth-subtitle">Securely store and access your files anywhere</div>
            <div id="authError" class="auth-error"></div>
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="emailInput" class="auth-input" placeholder="you@example.com">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="passInput" class="auth-input" placeholder="Min 4 characters">
            </div>
            <button class="btn" onclick="handleLogin()">Sign In / Create Account</button>
        </div>
    </div>

    <!-- Main Layout -->
    <div id="appLayout">
        <!-- Sidebar -->
        <aside class="sidebar glass">
            <div class="logo-area">
                <div class="logo-icon">N</div>
                <div class="logo-text">NexusCloud</div>
            </div>
            
            <div class="nav-menu">
                <a class="nav-item active" onclick="navigate('all')">
                    <span class="nav-icon">☁️</span> My Cloud
                </a>
                <a class="nav-item" onclick="navigate('photos')">
                    <span class="nav-icon">🖼️</span> Photos
                </a>
                <a class="nav-item" onclick="navigate('videos')">
                    <span class="nav-icon">🎬</span> Videos
                </a>
                <a class="nav-item" onclick="navigate('documents')">
                    <span class="nav-icon">📄</span> Documents
                </a>
            </div>

            <div class="storage-widget">
                <div class="storage-title">Storage Used</div>
                <div class="progress-bar">
                    <div class="progress-fill" id="storageFill" style="width: 100%;"></div>
                </div>
                <div class="storage-text"><span id="storageUsed">0 MB</span> / Unlimited</div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content glass">
            <header class="header">
                <div class="search-bar">
                    <span class="search-icon">🔍</span>
                    <input type="text" class="search-input" placeholder="Search your files..." id="searchInput" oninput="renderFiles()">
                </div>
                <div class="header-actions">
                    <button class="btn-upload" onclick="document.getElementById('fileInput').click()">
                        <span>➕</span> Upload File
                    </button>
                    <button class="btn-upload" style="background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2)" onclick="document.getElementById('folderInput').click()">
                        <span>📁</span> Upload Folder
                    </button>
                    <input type="file" id="fileInput" multiple onchange="handleFileUpload(event)">
                    <input type="file" id="folderInput" webkitdirectory directory multiple onchange="handleFileUpload(event)">
                    
                    <div class="profile-btn" onclick="logout()">
                        <div class="avatar" id="userAvatar">A</div>
                        <div class="profile-name" id="userName">Account</div>
                    </div>
                </div>
            </header>

            <div class="content-scroll">
                <div class="section-title" id="viewTitle">My Cloud</div>
                
                <div id="emptyState" class="empty-state">
                    <div class="empty-icon">📂</div>
                    <div class="empty-text">Your cloud is empty. Upload files to get started.</div>
                    <button class="btn" style="width: auto; padding: 12px 30px;" onclick="document.getElementById('fileInput').click()">Upload Files</button>
                </div>

                <table class="files-table" id="filesTable" style="display: none;">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Date Modified</th>
                            <th>Size</th>
                            <th style="text-align: right;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="filesList">
                        <!-- Rows populated by JS -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <div id="toast" class="toast">Action completed successfully</div>

    <script>
        // Data Structure
        let currentUser = null;
        let filesData = []; // { id, name, size, type, date, dataUrl, folder }
        let currentFilter = 'all';

        // DOM Elements
        const authScreen = document.getElementById('authScreen');
        const appLayout = document.getElementById('appLayout');
        const emailInput = document.getElementById('emailInput');
        const passInput = document.getElementById('passInput');
        const authError = document.getElementById('authError');
        const emptyState = document.getElementById('emptyState');
        const filesTable = document.getElementById('filesTable');
        const filesList = document.getElementById('filesList');
        const searchInput = document.getElementById('searchInput');
        const viewTitle = document.getElementById('viewTitle');

        // Init
        window.onload = () => {
            const savedUser = localStorage.getItem('nexus_user');
            if (savedUser) {
                login(savedUser);
            }
        };

        function handleLogin() {
            const email = emailInput.value.trim();
            const pass = passInput.value;
            
            if (!email.includes('@')) {
                authError.textContent = 'Please enter a valid email.';
                return;
            }
            if (pass.length < 4) {
                authError.textContent = 'Password must be at least 4 characters.';
                return;
            }
            
            login(email);
        }

        function login(email) {
            currentUser = email;
            localStorage.setItem('nexus_user', email);
            
            // Set UI
            document.getElementById('userName').textContent = email.split('@')[0];
            document.getElementById('userAvatar').textContent = email.charAt(0).toUpperCase();
            
            authScreen.style.opacity = '0';
            setTimeout(() => {
                authScreen.style.display = 'none';
                appLayout.style.display = 'flex';
                loadFiles();
            }, 500);
        }

        function logout() {
            localStorage.removeItem('nexus_user');
            currentUser = null;
            appLayout.style.display = 'none';
            authScreen.style.display = 'flex';
            authScreen.style.opacity = '1';
            emailInput.value = '';
            passInput.value = '';
            filesData = [];
        }

        async function loadFiles() {
            try {
                const response = await fetch(`/api/files?email=${currentUser}`);
                if (response.ok) {
                    filesData = await response.json();
                } else {
                    filesData = [];
                }
            } catch (err) {
                console.error('Error fetching files:', err);
                filesData = [];
                showToast("Error loading files from server.");
            }
            renderFiles();
            updateStorage();
        }

        async function saveFileToServer(file) {
            try {
                const response = await fetch('/api/files', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: currentUser, file })
                });
                if (!response.ok) {
                    throw new Error("Server error");
                }
                updateStorage();
            } catch (e) {
                showToast("Storage limit or server error! File not saved.");
                // Remove from local array if failed
                filesData = filesData.filter(f => f.id !== file.id);
                renderFiles();
            }
        }

        // Utilities
        function formatSize(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        function getFileIcon(type, name) {
            if (type.startsWith('image/')) return '🖼️';
            if (type.startsWith('video/')) return '🎬';
            if (type.startsWith('audio/')) return '🎵';
            if (name.endsWith('.pdf')) return '📕';
            if (name.endsWith('.doc') || name.endsWith('.docx')) return '📘';
            if (name.endsWith('.xls') || name.endsWith('.xlsx')) return '📗';
            if (name.endsWith('.zip') || name.endsWith('.rar')) return '📦';
            return '📄';
        }
        
        function getCategory(type) {
             if (type.startsWith('image/')) return 'photos';
             if (type.startsWith('video/')) return 'videos';
             return 'documents';
        }

        async function handleFileUpload(event) {
            const files = event.target.files;
            if (!files.length) return;
            
            showToast(`Uploading ${files.length} file(s)...`);
            
            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                
                // Read as Data URL
                const reader = new FileReader();
                reader.onload = async (e) => {
                    let folderPath = 'Root';
                    if (file.webkitRelativePath) {
                        const parts = file.webkitRelativePath.split('/');
                        if(parts.length > 1) {
                            folderPath = parts.slice(0, parts.length - 1).join(' / ');
                        }
                    }
                
                    const newFile = {
                        id: Date.now().toString() + Math.random().toString(36).substr(2, 5),
                        name: file.name,
                        size: file.size,
                        type: file.type || 'unknown',
                        category: getCategory(file.type),
                        date: new Date().toISOString(),
                        dataUrl: e.target.result,
                        folder: folderPath
                    };
                    
                    filesData.unshift(newFile);
                    renderFiles();
                    await saveFileToServer(newFile);
                };
                reader.readAsDataURL(file);
            }
            
            event.target.value = ''; // Reset input
        }

        async function deleteFile(id) {
            try {
                const response = await fetch(`/api/files/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    filesData = filesData.filter(f => f.id !== id);
                    renderFiles();
                    updateStorage();
                    showToast("File deleted successfully");
                } else {
                    showToast("Failed to delete file on server");
                }
            } catch (err) {
                showToast("Error communicating with server");
            }
        }
        
        function downloadFile(id) {
            const file = filesData.find(f => f.id === id);
            if(!file) return;
            const a = document.createElement('a');
            a.href = file.dataUrl;
            a.download = file.name;
            a.click();
            showToast(`Downloading ${file.name}`);
        }

        function navigate(filter) {
            currentFilter = filter;
            
            // Update Nav UI
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            event.currentTarget.classList.add('active');
            
            // Update Title
            const titles = {
                'all': 'My Cloud',
                'photos': 'Photos',
                'videos': 'Videos',
                'documents': 'Documents'
            };
            viewTitle.textContent = titles[filter];
            
            renderFiles();
        }

        function renderFiles() {
            const query = searchInput.value.toLowerCase();
            let filtered = filesData;
            
            if (currentFilter !== 'all') {
                filtered = filtered.filter(f => f.category === currentFilter);
            }
            
            if (query) {
                filtered = filtered.filter(f => f.name.toLowerCase().includes(query));
            }
            
            if (filtered.length === 0) {
                emptyState.style.display = 'block';
                filesTable.style.display = 'none';
            } else {
                emptyState.style.display = 'none';
                filesTable.style.display = 'table';
                
                filesList.innerHTML = filtered.map(file => `
                    <tr class="file-row">
                        <td>
                            <div class="file-name-cell">
                                <span class="file-icon">${getFileIcon(file.type, file.name)}</span>
                                <div>
                                    <div>${file.name}</div>
                                    ${file.folder !== 'Root' ? `<div style="font-size:11px; color:var(--text-muted); margin-top:2px;">📁 ${file.folder}</div>` : ''}
                                </div>
                            </div>
                        </td>
                        <td style="color: var(--text-muted)">${new Date(file.date).toLocaleDateString()}</td>
                        <td style="color: var(--text-muted)">${formatSize(file.size)}</td>
                        <td style="text-align: right;">
                            <button class="file-download-btn" onclick="downloadFile('${file.id}')" title="Download">⬇️</button>
                            <button class="file-action-btn" onclick="deleteFile('${file.id}')" title="Delete">🗑️</button>
                        </td>
                    </tr>
                `).join('');
            }
        }

        function updateStorage() {
            const totalSize = filesData.reduce((acc, file) => acc + file.size, 0);
            document.getElementById('storageUsed').textContent = formatSize(totalSize);
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
    </script>
</body>
</html>
